; SPatch sample configuration
[SPatch]

; Core
enabled=1
allow_unsupported_build=0
write_minidumps=1

; Fixes and restorations
fix_cutscene_zero_dt=1
fix_cutscene_scene_time_step=1
disable_time_step_smoothing=0
hook_fog_slicing_guard=1
warn_low_res_buffer=1
restore_character_visual_damage=1

; Stock option overrides
; Use -1 to keep the game's own value where supported.
time_step_smoothing_frames=2
override_low_res_buffer=0
override_shadow_filter=1
override_ssao=1
override_fps_limiter=-1
override_texture_detail_level=2
override_world_density=-1
override_rumble_enabled=-1

; Adapter / memory
hook_vram_adapter_fix=1
vram_override_mb=0

; Anti-aliasing
hook_smaa_present=1
smaa_enable=1
smaa_disable_stock_aa=1
smaa_preset=2

; Tonemapping
hook_aces_final=1
hook_aces_presentbuffer=1
hook_aces_display_curve=1
aces_enable=1
aces_strength_percent=100
aces_exposure_scale_percent=175
